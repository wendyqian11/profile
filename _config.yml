# ---------------------------------------------------------------------------
# Site settings — edit the values below to make the site yours.
# After editing this file, changes appear on your live site in ~1 minute.
# ---------------------------------------------------------------------------

title: "Wendy Qian"                 # <- Your name / site title (shows in the header)
tagline: "Personal site & blog"     # <- Short subtitle
description: >-                      # <- Used by search engines & social previews
  The personal website and blog of Wendy Qian.
author: "Wendy Qian"                 # <- Your name (used on blog posts)
email: ""                           # <- Optional: your email (leave "" to hide)

# The repo 'xiaoyuqian.github.io' lives under the 'wendyqian11' account, so it is
# served as a PROJECT site at: https://wendyqian11.github.io/xiaoyuqian.github.io/
# 'url' is the account domain; 'baseurl' is the sub-path (the repo name).
url: "https://wendyqian11.github.io"
baseurl: "/xiaoyuqian.github.io"

# Optional social links — fill in a username to show the icon, or leave blank.
github_username: "xiaoyuqian"
# twitter_username: ""
# linkedin_username: ""

# ---- Theme & plugins (these make the site look good; no need to change) ----
theme: minima
plugins:
  - jekyll-feed        # adds an RSS feed for your blog
  - jekyll-seo-tag     # adds nice social/search previews

# Links shown in the top navigation bar, in order.
header_pages:
  - about.md

# Show newest posts first, formatted date.
minima:
  date_format: "%b %-d, %Y"

# Files Jekyll should ignore when building.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
